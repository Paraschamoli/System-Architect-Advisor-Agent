# System Architect Advisor Skill
# AI-powered system design and architecture planning assistant

# Basic Metadata
id: system-architect-advisor-agent-v1
name: system-architect-advisor-agent
version: 1.0.0
author: paras@getbindu.com

# Description
description: |
  Transforms natural language project requirements into structured technical design documents.
  Uses a two-phase pipeline: DeepSeek R1 for structured JSON analysis, Claude 3.5 Sonnet for
  markdown report generation. Outputs include architecture decisions, infrastructure specs,
  security measures, database choices, tech stack, risk assessment, and implementation roadmap.

# Tags and Modes
tags:
  - system-architecture
  - technical-design
  - architecture-recommendations
  - technical-documentation

input_modes:
  - text/plain

output_modes:
  - text/markdown

# Example Queries
examples:
  - "Design a scalable system architecture for a multi-tenant SaaS analytics platform handling 50K users and 10TB monthly data"
  - "Create a system design for a fintech payment processing platform with PCI-DSS compliance and 5K TPS"
  - "Design a real-time chat application architecture for 100K concurrent users"

# Detailed Capabilities
capabilities_detail:
  architecture_analysis:
    supported: true
    method: "Two-phase LLM pipeline (reasoning + drafting)"
    output_format: "Structured JSON converted to markdown technical report"
    patterns_analyzed:
      - microservices
      - monolithic
      - serverless
      - event_driven
      - layered

  structured_output:
    supported: true
    schema_fields:
      - architecture_decision (pattern, rationale, trade-offs, cost estimates)
      - infrastructure_resources (resource type, specs, scaling policy, cost)
      - security_measures (measure type, priority, compliance standards, data classification)
      - database_choice
      - tech_stack (frontend, backend, devops)
      - risk_assessment (risk to mitigation mapping)
      - implementation_roadmap (phased steps)

  reasoning_transparency:
    supported: true
    method: "DeepSeek R1 reasoning tokens extracted and included in collapsible section"

  memory_integration:
    supported: true
    condition: "Only if MEM0_API_KEY environment variable is set"
    tool: "Mem0Tools"

# Performance Metrics
performance:
  processing_phases: 2
  phase_1_reasoning: "DeepSeek R1 analysis (max 4000 tokens)"
  phase_2_drafting: "Claude 3.5 Sonnet markdown generation"
  estimated_time: "Variable based on LLM API response times"
  async_execution: true
  lazy_initialization: true

# Technical Implementation
technical_implementation:
  reasoning_model:
    id: "deepseek/deepseek-r1"
    provider: "OpenRouter"
    purpose: "Structured JSON schema generation with reasoning"
    max_tokens: 4000

  drafting_model:
    id: "anthropic/claude-3.5-sonnet"
    provider: "OpenRouter via Agno"
    purpose: "Transform JSON spec into professional markdown report"

  framework: "Agno Agent framework"
  server: "Bindu (bindufy)"
  protocol: "JSON-RPC 2.0"
  default_port: 3773

  dependencies:
    - agno
    - openai (SDK for OpenRouter)
    - bindu
    - mem0 (optional)

# API Requirements
api_requirements:
  required:
    - OPENROUTER_API_KEY
  optional:
    - MEM0_API_KEY (enables memory features)

  configurable_models:
    - REASONING_MODEL (env var or --reasoning-model CLI arg)
    - DRAFTING_MODEL (env var or --drafting-model CLI arg)

# Input Processing
input_processing:
  accepts: "List of message objects with role and content"
  extracts: "Last user message from conversation history"
  validation: "Returns error if no user input found"

# Output Format
output_format:
  primary: "Markdown technical design document"
  sections_generated:
    - Executive summary
    - System architecture overview
    - Architectural pattern selection with rationale
    - Infrastructure design
    - Security architecture
    - Database strategy
    - Technical stack
    - Risk mitigation strategies
    - Mermaid diagrams (where appropriate)

  additional_content:
    - Collapsible reasoning section with DeepSeek R1 thought process

# Deliverables
deliverables:
  markdown_report:
    - Technical design document
    - Architecture decisions with reasoning
    - Mermaid.js diagrams
    - Trade-off analysis
    - Cost estimates (if provided by reasoning model)
    - Implementation recommendations

  reasoning_artifacts:
    - Extracted reasoning tokens from DeepSeek R1
    - JSON specification used for report generation

# Limitations
limitations:
  - "Does not implement code or infrastructure"
  - "Output quality depends on LLM model capabilities"
  - "Requires OpenRouter API key to function"
  - "No built-in validation of generated architecture recommendations"
  - "Does not access external systems or real-time data"
  - "Cannot execute or test proposed architectures"
  - "Reasoning extraction depends on model response format"

# Error Handling
error_handling:
  missing_api_key: "Raises ValueError with clear error message"
  reasoning_phase_failure: "Returns error message to user"
  agent_not_initialized: "Raises RuntimeError"
  general_exceptions: "Caught and returned as formatted error strings"

# Best Practices for Users
best_practices:
  - "Provide detailed project requirements including scale, performance needs, and constraints"
  - "Specify compliance requirements (PCI-DSS, GDPR, SOC2, etc.) if applicable"
  - "Include expected user scale and data volume"
  - "Mention existing technology preferences or constraints"
  - "Be specific about security and availability requirements"
