# System Architect Advisor Skill
# AI-powered system design and architecture planning assistant

# Basic Metadata
id: system-architect-advisor-agent-v1
name: system-architect-advisor-agent
version: 1.0.0
author: paras@getbindu.com

# Description
description: |
  AI System Architect Advisor is an intelligent system design assistant that transforms natural language
  project requirements into structured architecture recommendations, infrastructure planning, security strategies,
  and compliance considerations. It leverages a dual-model reasoning pipeline with DeepSeek R1 for structured
  analysis and Claude 3.5 Sonnet for professional documentation generation.

# Tags and Modes
tags:
  - system-architecture
  - technical-design
  - infrastructure-planning
  - security-strategy
  - compliance
  - implementation-roadmap
  - technical-documentation
  - software-architecture

input_modes:
  - text/plain
  - application/json

output_modes:
  - text/plain
  - application/json
  - text/markdown

# Example Queries
examples:
  - "Design a microservices architecture for an e-commerce platform handling 1M users daily with real-time inventory"
  - "Create a system design for a fintech payment processing system with PCI compliance and 10K TPS"
  - "Plan cloud migration strategy for legacy monolith to microservices architecture"
  - "Design real-time chat application with video calling for 100K concurrent users"
  - "Create technical roadmap for social media platform with recommendation engine"

# Detailed Capabilities
capabilities_detail:
  architecture_design:
    supported: true
    patterns:
      - microservices
      - serverless
      - event_driven
      - cqrs
      - domain_driven_design
    considerations:
      - scalability
      - performance
      - reliability
      - maintainability
  infrastructure_planning:
    supported: true
    cloud_providers:
      - aws
      - azure
      - gcp
      - multi_cloud
    services:
      - compute
      - storage
      - networking
      - databases
      - cdn
  security_strategy:
    supported: true
    areas:
      - authentication
      - authorization
      - data_encryption
      - network_security
      - compliance_standards
  compliance_considerations:
    supported: true
    standards:
      - gdpr
      - hipaa
      - pci_dss
      - soc2
      - iso27001

# Performance Metrics
performance:
  average_processing_time: "~30-90 seconds per architecture design"
  max_concurrent_requests: 10
  memory_per_request: "~512MB"
  supported_project_sizes:
    - small_startup
    - medium_enterprise
    - large_scale_systems
  reasoning_model: "deepseek/deepseek-r1"
  drafting_model: "anthropic/claude-3.5-sonnet"

# Technical Expertise
technical_expertise:
  programming_languages:
    - python
    - javascript/typescript
    - java
    - go
    - rust
    - c#/.net
    - ruby
  databases:
    - relational_sql (postgresql, mysql, sqlserver)
    - nosql (mongodb, cassandra, dynamodb)
    - graph_databases (neo4j, amazon neptune)
    - time_series (influxdb, timescaledb)
    - search_engines (elasticsearch, opensearch)
    - cache (redis, memcached)
  cloud_platforms:
    - aws (ec2, lambda, eks, rds, aurora)
    - azure (vm, functions, aks, cosmos db)
    - gcp (compute engine, cloud run, gke, cloud spanner)
    - multi_cloud_strategies
  devops_tools:
    - docker
    - kubernetes
    - jenkins
    - gitlab_ci
    - github_actions
    - terraform
    - ansible
  monitoring:
    - prometheus
    - grafana
    - elk_stack
    - datadog
    - new_relic
    - aws_cloudwatch
    - azure_monitor

# Use Cases
use_cases:
  primary:
    - "Startup architecture planning and MVP design"
    - "Enterprise system modernization and migration"
    - "Technical due diligence and architecture reviews"
    - "Implementation roadmap creation"
  secondary:
    - "Team technical training and guidance"
    - "Vendor technology evaluation"
    - "Cost optimization analysis"
    - "Risk assessment and mitigation"

# Deliverables
deliverables:
  architecture_diagrams:
    - system_overview
    - component_interactions
    - data_flow
    - deployment_topology
    - security_architecture
  technical_documents:
    - architecture_decisions (ADRs)
    - api_specifications
    - security_guidelines
    - deployment_strategies
    - infrastructure_requirements
  implementation_plans:
    - phased_roadmap
    - resource_requirements
    - timeline_estimates
    - risk_mitigation
    - cost_projections
  compliance_frameworks:
    - gdpr_compliance
    - pci_dss_requirements
    - hipaa_guidelines
    - soc2_controls
    - iso27001_standards

# Limitations
limitations:
  - "Provides recommendations, not actual implementation"
  - "Requires clear and detailed requirements"
  - "Cannot access proprietary internal systems"
  - "Recommendations based on general best practices"

# Best Practices
best_practices:
  - "Provide detailed business requirements and constraints"
  - "Specify expected scale and performance requirements"
  - "Include budget and timeline constraints"
  - "Mention existing technology stack and preferences"
  - "Define compliance and regulatory requirements"
